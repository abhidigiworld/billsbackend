name: Scheduled API Triggers

on:
  schedule:
    # 1. DB Backup: Runs every night at 2:00 AM UTC (7:30 AM IST)
    - cron: '0 2 * * *'
    # 2. Attendance Email: Runs daily at 8:00 AM UTC (1:30 PM IST) on weekdays (Mon-Fri)
    - cron: '0 8 * * 1-5'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  trigger-backup:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 2 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DB Backup API
        run: |
          curl --fail -X POST "https://billsbackend.vercel.app/api/cron/backup" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  trigger-attendance:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 8 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Attendance Email API
        run: |
          curl --fail -X POST "https://billsbackend.vercel.app/api/cron/attendance-email" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
